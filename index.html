<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --main-color: #ff4757;
            --rank-bg: #2d2d2d;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* 메인 컨테이너: 위쪽으로 더 치우치게 조정 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 중앙이 아닌 위쪽부터 배치 */
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding-top: 15vh; /* 화면 높이의 15%만큼 위에서 띄움 */
        }

        h1 { 
            margin: 0 0 10px 0; 
            font-weight: 300; 
            letter-spacing: 4px; 
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
        }

        #scoreDisplay { 
            font-size: 3rem; 
            font-weight: bold; 
            margin: 0 0 40px 0; 
            color: var(--main-color);
        }

        /* 중앙 클릭 버튼 */
        .click-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: var(--main-color);
            border: 10px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .click-btn:active {
            transform: scale(0.90);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.2);
        }

        /* 랭킹창 (기존과 동일하지만 디자인 살짝 다듬음) */
        .rank-panel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(calc(100% - 70px));
            width: 100%;
            max-width: 500px;
            height: 75vh;
            background-color: var(--rank-bg);
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.6);
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 10;
        }

        .rank-panel.active {
            transform: translateX(-50%) translateY(0);
        }

        .rank-header {
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .handle {
            width: 40px;
            height: 4px;
            background-color: #444;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .rank-title { 
            font-size: 0.9rem; 
            font-weight: bold; 
            color: #aaa;
            letter-spacing: 1px;
        }

        .rank-content {
            padding: 0 30px 30px 30px;
            height: calc(100% - 100px);
            overflow-y: auto;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .rank-item span { color: #ccc; }
        .rank-item b { color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>CLICKER</h1>
        <p id="scoreDisplay">0</p>
        <button class="click-btn" id="mainBtn">CLICK</button>
    </div>

    <div class="rank-panel" id="rankPanel">
        <div class="rank-header" id="rankHeader">
            <div class="handle"></div>
            <div class="rank-title">LEADERBOARD</div>
        </div>
        <div class="rank-content">
            <div class="rank-item"><span>1. 태훈</span><b>1,250</b></div>
            <div class="rank-item"><span>2. Player1</span><b>980</b></div>
            <div class="rank-item"><span>3. Player2</span><b>750</b></div>
            <div class="rank-item"><span>4. Player3</span><b>500</b></div>
            <div class="rank-item"><span>5. Player4</span><b>320</b></div>
        </div>
    </div>

    <script>
        const rankPanel = document.getElementById('rankPanel');
        const rankHeader = document.getElementById('rankHeader');
        const mainBtn = document.getElementById('mainBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        let count = 0;

        rankHeader.addEventListener('click', () => {
            rankPanel.classList.toggle('active');
        });

        mainBtn.addEventListener('click', () => {
            count++;
            scoreDisplay.innerText = count.toLocaleString();
        });
    </script>
</body>
</html>
