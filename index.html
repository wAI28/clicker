<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker Pro</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --main-color: #ff4757;
            --rank-bg: #2d2d2d;
            --text-color: #ffffff;
            --my-rank-bg: #3d3d3d; /* 내 순위 표시용 배경색 */
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        
        #statsDisplay {
            position: absolute; top: 20px; left: 20px;
            font-family: monospace; font-size: 1.1rem; color: rgba(255,255,255,0.7);
            line-height: 1.4; pointer-events: none; z-index: 20;
        }

        #logoutBtn {
            position: absolute; top: 20px; right: 20px;
            background: none; border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6); padding: 8px 15px; border-radius: 20px;
            font-size: 0.8rem; cursor: pointer; display: none; z-index: 20;
        }

        .main-container {
            flex: 1; display: flex; flex-direction: column; justify-content: flex-start;
            align-items: center; width: 100%; max-width: 500px; padding-top: 15vh;
            position: relative;
        }
        h1 { margin: 0 0 10px 0; font-weight: 300; letter-spacing: 4px; font-size: 1.2rem; color: rgba(255,255,255,0.3); }
        #scoreDisplay { font-size: 3.5rem; font-weight: bold; margin: 0 0 30px 0; color: var(--main-color); }
        
        .particle {
            position: fixed; border-radius: 50%; background-color: var(--main-color);
            pointer-events: none; z-index: 4;
            animation: explode 0.5s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }

        .click-btn {
            width: 220px; height: 220px; border-radius: 50%; background-color: var(--main-color);
            border: 10px solid rgba(255, 255, 255, 0.1); color: white; font-size: 28px;
            font-weight: 900; cursor: pointer; box-shadow: 0 15px 35px rgba(255, 71, 87, 0.4);
            transition: transform 0.05s; outline: none; -webkit-tap-highlight-color: transparent;
            z-index: 5;
        }
        .click-btn:active { transform: scale(0.92); }
        .user-info { margin-top: 20px; font-size: 0.9rem; color: #888; text-align: center; }

        .rank-panel {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(calc(100% - 70px));
            width: 100%; max-width: 500px; height: 75vh; background-color: var(--rank-bg);
            border-radius: 30px 30px 0 0; box-shadow: 0 -15px 40px rgba(0,0,0,0.6);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1); z-index: 10;
            display: flex; flex-direction: column;
        }
        .rank-panel.active { transform: translateX(-50%) translateY(0); }
        .rank-header { height: 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; }
        .handle { width: 40px; height: 4px; background-color: #444; border-radius: 10px; margin-bottom: 10px; }
        .rank-title { font-size: 0.8rem; font-weight: bold; color: #666; letter-spacing: 2px; }
        
        .rank-content { padding: 0 25px; flex: 1; overflow-y: auto; }
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-info { display: flex; flex-direction: column; gap: 4px; }
        .rank-name { color: #ccc; font-size: 0.95rem; }
        .rank-cps { color: #666; font-size: 0.75rem; font-family: monospace; }
        .rank-clicks { color: #fff; font-size: 1.1rem; font-weight: bold; }

        /* 내 순위 고정바 스타일 */
        .my-rank-sticky {
            background-color: var(--my-rank-bg);
            padding: 15px 25px;
            border-top: 1px solid rgba(255, 71, 87, 0.3);
            display: none; /* 로그인 전에는 숨김 */
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="statsDisplay">
        CPS: <span id="currentCPS">0</span><br>
        MAX: <span id="maxCPS">-</span>
    </div>

    <button id="logoutBtn">LOGOUT</button>

    <div class="main-container">
        <h1>CLICKER</h1>
        <p id="scoreDisplay">0</p>
        <button class="click-btn" id="mainBtn">CLICK</button>
        <div id="userInfo" class="user-info">Checking status...</div>
    </div>

    <div class="rank-panel" id="rankPanel">
        <div class="rank-header" id="rankHeader">
            <div class="handle"></div>
            <div class="rank-title">LEADERBOARD</div>
        </div>
        <div class="rank-content" id="rankList"></div>
        <div class="my-rank-sticky" id="myRankSticky">
            <div class="rank-item" style="border-bottom: none; padding: 0;">
                <div class="rank-info">
                    <span class="rank-name" id="myRankPos">Calculating...</span>
                    <span class="rank-cps" id="myRankCPS">Best CPS: -</span>
                </div>
                <b class="rank-clicks" id="myRankScore">0</b>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, increment, onSnapshot, collection, query, orderBy, limit, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBr6fn0z5WiCb8r0ho9dRM_rcJFncEZfdg",
            authDomain: "click-396e8.firebaseapp.com",
            projectId: "click-396e8",
            storageBucket: "click-396e8.firebasestorage.app",
            messagingSenderId: "985576350437",
            appId: "1:985576350437:web:ed65dbfff76cbdf5c2ea0c",
            measurementId: "G-EGW2NT2WE6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let myMaxCPS = 0;
        let clickHistory = [];
        const mainBtn = document.getElementById('mainBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const currentCPSEl = document.getElementById('currentCPS');
        const maxCPSEl = document.getElementById('maxCPS');
        const rankList = document.getElementById('rankList');
        const myRankSticky = document.getElementById('myRankSticky');

        function spawnParticles() {
            const rect = mainBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 4;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                const angle = Math.random() * Math.PI * 2;
                const startX = centerX + Math.cos(angle) * radius;
                const startY = centerY + Math.sin(angle) * radius;
                p.style.left = startX + 'px'; p.style.top = startY + 'px';
                const burstDist = Math.random() * 80 + 40;
                p.style.setProperty('--tx', Math.cos(angle) * burstDist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * burstDist + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 500);
            }
        }

        setInterval(() => {
            const now = Date.now();
            clickHistory = clickHistory.filter(t => now - t < 1000);
            const cps = clickHistory.length;
            currentCPSEl.innerText = cps;
            if (cps > myMaxCPS && currentUser) {
                myMaxCPS = cps;
                maxCPSEl.innerText = myMaxCPS;
                setDoc(doc(db, "clicker", currentUser.uid), { maxCPS: myMaxCPS }, { merge: true });
            }
        }, 100);

        let unsubscribeMyScore = null;

        onAuthStateChanged(auth, async (user) => {
            if (unsubscribeMyScore) unsubscribeMyScore();
            if (user) {
                currentUser = user;
                document.getElementById('userInfo').innerText = `Logged in as ${user.displayName}`;
                document.getElementById('logoutBtn').style.display = "block";
                myRankSticky.style.display = "block";
                
                unsubscribeMyScore = onSnapshot(doc(db, "clicker", user.uid), (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        scoreDisplay.innerText = (data.clicks || 0).toLocaleString();
                        myMaxCPS = data.maxCPS || 0;
                        maxCPSEl.innerText = myMaxCPS || "-";
                        // 하단 고정바 업데이트
                        document.getElementById('myRankCPS').innerText = `Best CPS: ${myMaxCPS || "-"}`;
                        document.getElementById('myRankScore').innerText = (data.clicks || 0).toLocaleString();
                        updateMyRankPosition(data.clicks);
                    }
                });
            } else {
                currentUser = null;
                myMaxCPS = 0;
                maxCPSEl.innerText = "-";
                document.getElementById('userInfo').innerText = "Login required to start";
                document.getElementById('logoutBtn').style.display = "none";
                myRankSticky.style.display = "none";
                scoreDisplay.innerText = "0";
            }
        });

        // 내 순위 계산 함수 (전체 인원 대비)
        async function updateMyRankPosition(myClicks) {
            if (!currentUser) return;
            const q = query(collection(db, "clicker"));
            const snapshot = await getDocs(q);
            let rank = 1;
            snapshot.forEach((doc) => {
                if (doc.data().clicks > myClicks) rank++;
            });
            document.getElementById('myRankPos').innerText = `${rank}. ${currentUser.displayName} (Me)`;
        }

        mainBtn.addEventListener('click', () => {
            clickHistory.push(Date.now());
            spawnParticles();
            if (!currentUser) { signInWithPopup(auth, provider); return; }
            setDoc(doc(db, "clicker", currentUser.uid), {
                name: currentUser.displayName,
                clicks: increment(1)
            }, { merge: true });
        });

        document.getElementById('logoutBtn').onclick = () => { if(confirm("Logout?")) signOut(auth); };

        onSnapshot(query(collection(db, "clicker"), orderBy("clicks", "desc"), limit(10)), (snapshot) => {
            let html = "";
            let rank = 1;
            snapshot.forEach((doc) => {
                const data = doc.data();
                html += `
                    <div class="rank-item">
                        <div class="rank-info">
                            <span class="rank-name">${rank}. ${data.name}${currentUser && doc.id === currentUser.uid ? " (Me)" : ""}</span>
                            <span class="rank-cps">Best CPS: ${data.maxCPS || "-"}</span>
                        </div>
                        <b class="rank-clicks">${(data.clicks || 0).toLocaleString()}</b>
                    </div>`;
                rank++;
            });
            rankList.innerHTML = html;
        });

        document.getElementById('rankHeader').onclick = () => document.getElementById('rankPanel').classList.toggle('active');
    </script>
</body>
</html>
