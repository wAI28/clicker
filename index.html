<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --main-color: #ff4757;
            --rank-bg: #2d2d2d;
            --text-color: #ffffff;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        
        /* Logout Button (Top Right) */
        #logoutBtn {
            position: absolute; top: 20px; right: 20px;
            background: none; border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6); padding: 8px 15px; border-radius: 20px;
            font-size: 0.8rem; cursor: pointer; display: none; /* Hidden by default */
            transition: 0.2s;
        }
        #logoutBtn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .main-container {
            flex: 1; display: flex; flex-direction: column; justify-content: flex-start;
            align-items: center; width: 100%; max-width: 500px; padding-top: 15vh;
        }
        h1 { margin: 0 0 10px 0; font-weight: 300; letter-spacing: 4px; font-size: 1.2rem; color: rgba(255,255,255,0.4); }
        #scoreDisplay { font-size: 3.5rem; font-weight: bold; margin: 0 0 30px 0; color: var(--main-color); }
        
        .click-btn {
            width: 220px; height: 220px; border-radius: 50%; background-color: var(--main-color);
            border: 10px solid rgba(255, 255, 255, 0.1); color: white; font-size: 28px;
            font-weight: 900; cursor: pointer; box-shadow: 0 15px 35px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s; outline: none; -webkit-tap-highlight-color: transparent;
        }
        .click-btn:active { transform: scale(0.90); }
        .user-info { margin-top: 20px; font-size: 0.9rem; color: #888; text-align: center; }

        /* Leaderboard Panel */
        .rank-panel {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(calc(100% - 70px));
            width: 100%; max-width: 500px; height: 75vh; background-color: var(--rank-bg);
            border-radius: 30px 30px 0 0; box-shadow: 0 -15px 40px rgba(0,0,0,0.6);
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1); z-index: 10;
        }
        .rank-panel.active { transform: translateX(-50%) translateY(0); }
        .rank-header { height: 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .handle { width: 40px; height: 4px; background-color: #444; border-radius: 10px; margin-bottom: 10px; }
        .rank-title { font-size: 0.8rem; font-weight: bold; color: #666; letter-spacing: 2px; }
        .rank-content { padding: 0 30px 30px 30px; height: calc(100% - 100px); overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-item span { color: #ccc; }
        .rank-item b { color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>

    <button id="logoutBtn">LOGOUT</button>

    <div class="main-container">
        <h1>CLICKER</h1>
        <p id="scoreDisplay">0</p>
        <button class="click-btn" id="mainBtn">CLICK</button>
        <div id="userInfo" class="user-info">Checking status...</div>
    </div>

    <div class="rank-panel" id="rankPanel">
        <div class="rank-header" id="rankHeader">
            <div class="handle"></div>
            <div class="rank-title">LEADERBOARD</div>
        </div>
        <div class="rank-content" id="rankList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, increment, onSnapshot, collection, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBr6fn0z5WiCb8r0ho9dRM_rcJFncEZfdg",
            authDomain: "click-396e8.firebaseapp.com",
            projectId: "click-396e8",
            storageBucket: "click-396e8.firebasestorage.app",
            messagingSenderId: "985576350437",
            appId: "1:985576350437:web:ed65dbfff76cbdf5c2ea0c",
            measurementId: "G-EGW2NT2WE6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        const mainBtn = document.getElementById('mainBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const userInfo = document.getElementById('userInfo');
        const rankList = document.getElementById('rankList');
        const logoutBtn = document.getElementById('logoutBtn');

        // Fetch score from DB
        async function fetchScore(uid) {
            const userRef = doc(db, "clicker", uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                scoreDisplay.innerText = userSnap.data().clicks.toLocaleString();
            }
        }

        // Auth state observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userInfo.innerText = `Logged in as ${user.displayName}`;
                logoutBtn.style.display = "block"; // Show logout
                fetchScore(user.uid);
            } else {
                currentUser = null;
                userInfo.innerText = "Login required to start";
                logoutBtn.style.display = "none"; // Hide logout
                scoreDisplay.innerText = "0";
            }
        });

        // Click Event
        mainBtn.addEventListener('click', async () => {
            if (!currentUser) {
                try {
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Login failed:", error);
                }
                return;
            }

            const userRef = doc(db, "clicker", currentUser.uid);
            await setDoc(userRef, {
                name: currentUser.displayName,
                clicks: increment(1)
            }, { merge: true });
        });

        // Logout Event
        logoutBtn.addEventListener('click', () => {
            if(confirm("Do you want to logout?")) {
                signOut(auth);
            }
        });

        // Leaderboard Real-time Update
        const q = query(collection(db, "clicker"), orderBy("clicks", "desc"), limit(10));
        onSnapshot(q, (snapshot) => {
            let html = "";
            let i = 1;
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = (currentUser && doc.id === currentUser.uid) ? " (Me)" : "";
                html += `<div class="rank-item"><span>${i}. ${data.name}${isMe}</span><b>${data.clicks.toLocaleString()}</b></div>`;
                if (currentUser && doc.id === currentUser.uid) {
                    scoreDisplay.innerText = data.clicks.toLocaleString();
                }
                i++;
            });
            rankList.innerHTML = html;
        });

        document.getElementById('rankHeader').addEventListener('click', () => {
            document.getElementById('rankPanel').classList.toggle('active');
        });
    </script>
</body>
</html>
